    - language: en-GB
      translation: Reply-To address for candidate emails
    - language: it-IT
      translation: Indirizzo Reply-To per le email ai/alle candidati/e
  validation:
    _or:
      - candidate_email_reply_to:
          _null: true
      - candidate_email_reply_to:
          _eq: ""
      - candidate_email_reply_to:
          _regex: ^[^\s@,;]+@[^\s@,;]+\.[^\s@,;]+$
  validation_message: Bitte eine gültige E-Mail-Adresse eingeben.
  width: half
