          _eq: ""
      - candidate_email_cc:
          _regex: ^[^\s@,;]+@[^\s@,;]+\.[^\s@,;]+(?:\s*[;,]\s*[^\s@,;]+@[^\s@,;]+\.[^\s@,;]+)*$
  validation_message: Bitte eine oder mehrere gültige E-Mail-Adressen eingeben.
