collection: elections
field: candidate_email_template
type: text
meta:
  collection: elections
  conditions: null
  display: raw
  display_options: null
  field: candidate_email_template
  group: null
  hidden: false
  interface: input-code
  note: >-
    HTML-Inhalt der Einladung innerhalb des gemeinsamen E-Mail-Rahmens. Verfügbare
    Platzhalter: {{ candidate_name }}, {{ candidate_salutation }}, {{ municipality_name
    }}, {{ cutoff_date }}, {{ personal_link }} und {{ projectName }}. Ein leerer Wert
    verwendet die Standardvorlage.
  options:
    language: html
  readonly: false
  required: false
  searchable: false
  sort: 17
  special: null
  translations:
    - language: de-DE
      translation: HTML-Vorlage für Kandidierenden-E-Mails
    - language: en-GB
      translation: HTML template for candidate emails
    - language: it-IT
      translation: Modello HTML per le email ai/alle candidati/e
  validation: null
  validation_message: null
  width: full
schema:
  name: candidate_email_template
  table: elections
  data_type: text
  default_value: |-
    <h1 style="color: #006e94; font-size: 24px; font-weight: 700; margin-bottom: 24px;">Einladung zum Klimawahl-Check: {{ municipality_name }}</h1>

    <p style="font-size: 16px; line-height: 1.5; color: #525252; margin-bottom: 16px;">
      {{ candidate_salutation }},
    </p>

    <p style="font-size: 16px; line-height: 1.5; color: #525252; margin-bottom: 24px;">
      wir freuen uns, Sie zur Teilnahme am Klimawahl-Check für die Gemeinde {{ municipality_name }} einzuladen. Über den untenstehenden Button gelangen Sie direkt zu Ihrem persönlichen Fragebogen, in dem Sie Ihre Positionen zu wichtigen Klimaschutz-Maßnahmen darlegen können.
    </p>

    <div style="text-align: center; margin-bottom: 30px;">
      <a
        class="button"
        rel="noopener"
        target="_blank"
        href="{{ personal_link }}"
        style="
          font-size: 16px;
          font-weight: 600;
          color: #ffffff;
          text-decoration: none;
          display: inline-block;
          padding: 12px 32px;
          border-radius: 8px;
          background: #006e94;
          border: 1px solid #006e94;
        "
      >
        <!--[if mso]>
          <i style="letter-spacing: 25px; mso-font-width: -100%; mso-text-raise: 30pt"
            >&nbsp;</i
          >
        <![endif]-->
        <span style="mso-text-raise: 15pt">Zum Klimawahl-Check</span>
        <!--[if mso]>
          <i style="letter-spacing: 25px; mso-font-width: -100%">&nbsp;</i>
        <![endif]-->
      </a>
    </div>

    <p style="font-size: 16px; line-height: 1.5; color: #525252; margin-bottom: 16px;">
      Bitte beachten Sie, dass die Frist für die Abgabe Ihrer Antworten am <strong>{{ cutoff_date }}</strong> endet.
    </p>

    <p style="font-size: 16px; line-height: 1.5; color: #525252; margin-bottom: 24px;">
      Sollten Sie Fragen haben oder Unterstützung benötigen, können Sie sich jederzeit gerne an uns wenden.
    </p>

    <hr style="border-top: 1px solid #d3dae4; margin-bottom: 24px;" />

    <p style="font-size: 14px; line-height: 1.5; color: #737373;">
      Vielen Dank für Ihren Beitrag zum Klimaschutz!<br />
      Ihr Team von {{ projectName }}
    </p>
  max_length: null
  numeric_precision: null
  numeric_scale: null
  is_nullable: true
  is_unique: false
  is_indexed: false
  is_primary_key: false
  is_generated: false
  generation_expression: null
  has_auto_increment: false
  foreign_key_table: null
  foreign_key_column: null
