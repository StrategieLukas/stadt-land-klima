name: auto_localteam_register
icon: person_add
color: "#4CAF50"
description: >
  Triggered by the frontend registration form.
  1. Creates a Directus user with the AdminLokalteam role.
  2. Creates a localteam record with that user as admin.
  3. Sends a password-setup email so the user can log in.
status: active
trigger: webhook
accountability: all
options:
  method: POST
operations:
  - name: Create Lokalteam Admin User
    key: create_localteam_admin
    type: item-create
    position_x: 1
    position_y: 1
    resolve_key: create_localteam
    options:
      collection: directus_users
      payload:
        first_name: "{{$trigger.body.name}}"
        email: "{{$trigger.body.email}}"
        title: "{{$trigger.body.organisation}}"
        description: "ARS: {{$trigger.body.ars}}"
        role: b8c043a2-a245-42d1-b28f-20c657270926
        status: active
      permissions: $full

  - name: Create Localteam
    key: create_localteam
    type: item-create
    position_x: 10
    position_y: 1
    resolve_key: send_password_reset
    options:
      collection: localteams
      payload:
        name: "{{$trigger.body.name}}"
        municipality_name: "{{$trigger.body.municipalityName}}"
        admin_id: "{{create_localteam_admin.id}}"
        status: draft
      emitEvents: true
      permissions: $full

  - name: Send Password Reset Email
    key: send_password_reset
    type: request
    position_x: 19
    position_y: 1
    options:
      url: "http://localhost:8055/auth/password/request"
      method: POST
      headers:
        Content-Type: application/json
      body: '{"email":"{{$trigger.body.email}}"}'

operation_key: create_localteam_admin
