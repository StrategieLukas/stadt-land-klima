name: create_slug_from_title
icon: format_color_text
color: null
description: Creates Slug from selected collections from field "title"
status: active
trigger: event
accountability: all
options:
  type: action
  scope:
    - items.create
  collections:
    - news_items
    - events
operations:
  - name: Update Data
    key: item_update_title_crt
    type: item-update
    position_x: 4
    position_y: 19
    options:
      collection: "{{$trigger.collection}}"
      payload:
        slug: "{{$last.text}}"
      key:
        - "{{ $trigger.key }}"
      permissions: $full
  - name: Slugify
    key: operation_slugify_title_crt
    type: operation-slugify
    position_x: 19
    position_y: 1
    options:
      text: "{{$trigger.payload.title}}"
    resolve_key: item_update_title_crt
operation_key: operation_slugify_title_crt
