name: notifyNewFormResponse
icon: email
color: null
description: Send email notifications whenever a public Blökkli form is submitted
status: active
trigger: event
accountability: all
options:
  type: action
  scope:
    - items.create
  collections:
    - form_responses
operations:
  - name: Send Notification Email
    key: send_form_response_email
    type: mail
    position_x: 19
    position_y: 1
    resolve_key: condition_send_form_response_copy
    options:
      to:
        - "{{$trigger.payload.notification_email}}"
      subject: "Neue Formularantwort: {{$trigger.payload.form_title}}"
      body: <p>Über ein öffentliches Formular wurde eine neue Antwort
        eingereicht.</p><p><strong>Formular:</strong>
        {{$trigger.payload.form_title}}</p><p><strong>Seite:</strong>
        {{$trigger.payload.page_path}}</p><p><strong>Absender:in:</strong>
        {{$trigger.payload.sender_name}}</p><p><strong>E-Mail:</strong>
        {{$trigger.payload.sender_email}}</p><p><strong>Antwort:</strong></p><pre>{{$trigger.payload.response_summary}}</pre>
      type: wysiwyg
  - name: Should Send Copy
    key: condition_send_form_response_copy
    type: condition
    position_x: 19
    position_y: 21
    options:
      filter:
        _and:
          - $trigger:
              payload:
                send_copy:
                  _eq: true
          - $trigger:
              payload:
                sender_email:
                  _nnull: true
    resolve_key: send_form_response_copy
  - name: Send Copy Email
    key: send_form_response_copy
    type: mail
    position_x: 19
    position_y: 41
    options:
      to:
        - "{{$trigger.payload.sender_email}}"
      subject: "Kopie Ihrer Formularantwort an Stadt.Land.Klima!: {{$trigger.payload.form_title}}"
      body: <p>Vielen Dank für Ihre Nachricht. Dies ist die gewünschte
        Kopie Ihrer Formularantwort.</p><p><strong>Formular:</strong>
        {{$trigger.payload.form_title}}</p><p><strong>Antwort:</strong></p><pre>{{$trigger.payload.response_summary}}</pre>
      type: wysiwyg
operation_key: send_form_response_email
