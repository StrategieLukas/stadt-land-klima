name: update_slug_from_title
icon: bolt
color: null
description: when updated title create Slug
status: active
trigger: event
accountability: all
options:
  type: action
  scope:
    - items.update
  collections:
    - news_items
    - events
operations:
  - name: Slugify
    key: operation_slugify_title_upd
    type: operation-slugify
    position_x: 3
    position_y: 19
    options:
      text: "{{$trigger.payload.title}}"
    resolve_key: item_update_title_upd
  - name: Kondition
    key: condition_title_upd
    type: condition
    position_x: 19
    position_y: 1
    options:
      filter:
        $trigger:
          payload:
            title:
              _nnull: true
    resolve_key: operation_slugify_title_upd
  - name: Daten aktualisieren
    key: item_update_title_upd
    type: item-update
    position_x: 21
    position_y: 19
    options:
      payload:
        slug: "{{$last.text}}"
      key: "{{ $trigger.keys}}"
      collection: "{{$trigger.collection}}"
operation_key: condition_title_upd
