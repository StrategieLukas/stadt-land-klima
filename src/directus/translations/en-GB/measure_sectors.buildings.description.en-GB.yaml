language: en-GB
key: measure_sectors.buildings.description
value: >-
  Climate action in buildings and heating is crucial because this sector
  accounts for a substantial share of greenhouse gas emissions. Energy
  efficiency and the use of renewable energy in buildings play a key role in
  reducing these emissions.

  Climate action in buildings also requires the modernisation and retrofitting
  of existing structures. Municipalities and cities play an important role in
  implementing these measures.
