language: en-GB
key: measure_sectors.transport.description
value: >-
  In cities and municipalities, specific transport measures can be taken to
  reduce CO₂ emissions and improve quality of life.

  One option is to promote public transport; expanding cycle-friendly
  infrastructure and safe walking routes is also essential to encourage people
  to use alternative modes of transport. 

  Promoting car-sharing and bike-sharing services is another way to make
  transport more climate-friendly.

  Local measures in the transport sector can make our cities more liveable and
  improve residents' health.
