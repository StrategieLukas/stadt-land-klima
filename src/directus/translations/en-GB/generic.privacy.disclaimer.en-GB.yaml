key: generic.privacy.disclaimer
value: By clicking the "Send message" button, you agree to the processing of the
  personal data you have provided and your email address in accordance with Art.
  6(1)(f) GDPR. If you do not want this, you can object to our use of your data
  in general or for specific purposes at any time. Please contact us using the
  contact details listed in our legal notice.
