language: de-DE
key: stats.dominance.network.note
value: <strong>Nähe</strong> = Kommunen sind durch eine Dominanzkante direkt
  verbunden und werden zusammengezogen (Federkraft). <strong>Distanz</strong> =
  keine direkte Kante - Abstossung dominiert. Cluster aus eng beieinander
  liegenden Knoten sind Leistungs-Tiers, in denen sich Kommunen gegenseitig
  ähnlich stark übertreffen oder auf Augenhoehe sind.
