language: it-IT
key: measure_sectors.management.description
value: La gestione locale del cambiamento climatico è un approccio cruciale per
  intraprendere azioni a livello comunitario per combattere il cambiamento
  climatico. Ciò comporta lo sviluppo e l’implementazione di strategie per
  ridurre le emissioni di gas serra nella propria comunità adattandosi al tempo
  stesso ai cambiamenti climatici che stanno già avvenendo.
