language: it-IT
key: generic.privacy.disclaimer
value: Cliccando sul pulsante "Invia messaggio" acconsenti al trattamento dei
  dati personali forniti e del tuo indirizzo email ai sensi dell'art. 6 par. 1
  lett.f GDPR. Se non lo desideri, puoi opporti in qualsiasi momento al nostro
  utilizzo dei tuoi dati in linea di principio o per scopi specifici. Ti
  preghiamo di contattarci utilizzando le opzioni di contatto elencate nelle
  nostre note legali.
