language: it-IT
key: measure_sectors.transport.description
value: >-
  Nelle città e nei comuni è possibile adottare misure concrete nel settore dei
  trasporti per ridurre le emissioni di CO₂ e migliorare la qualità della vita.

  Un’opzione è quella di promuovere il trasporto pubblico; anche l’espansione
  delle infrastrutture adatte alle biciclette e i percorsi pedonali sicuri sono
  essenziali per incoraggiare le persone a utilizzare mezzi di trasporto
  alternativi. 

  La promozione dei servizi di car/bike sharing costituisce un ulteriore
  approccio per rendere i trasporti più rispettosi del clima.

  Le misure locali nel settore dei trasporti possono rendere le nostre città più
  vivibili e promuovere la salute dei loro residenti.
