language: it-IT
key: measure_sectors.industry.description
value: >-
  La protezione locale del clima nell’industria, nell’economia e nei consumi
  richiede la cooperazione tra aziende, consumatori e comunità per promuovere
  un’economia e uno stile di vita sostenibili. 

  Le aziende locali o municipali possono migliorare la propria impronta di
  carbonio passando a tecnologie e processi produttivi rispettosi dell’ambiente.
