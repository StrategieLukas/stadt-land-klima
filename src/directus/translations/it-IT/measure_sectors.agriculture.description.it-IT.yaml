language: it-IT
key: measure_sectors.agriculture.description
value: >-
  L’agricoltura e l’alimentazione sono strettamente legate alla natura e al
  clima.

  La protezione degli ecosistemi naturali come parchi, spazi verdi, foreste e
  zone umide è fondamentale perché immagazzinano carbonio e preservano la
  biodiversità. Queste risorse naturali svolgono un ruolo chiave nella
  protezione del clima.
