language: it-IT
key: measure_sectors.buildings.description
value: >-
  La protezione del clima nel settore degli edifici e del riscaldamento è di
  fondamentale importanza, poiché questo settore provoca una quota significativa
  delle emissioni di gas serra. L’efficienza energetica e l’uso di energie
  rinnovabili negli edifici svolgono un ruolo chiave nella riduzione di queste
  emissioni.

  La protezione del clima nel settore edile richiede anche l’ammodernamento e la
  riconversione delle strutture esistenti. I comuni e le città svolgono un ruolo
  importante nell’attuazione di queste misure.
