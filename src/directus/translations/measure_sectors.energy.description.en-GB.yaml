language: en-GB
key: measure_sectors.energy.description
value: >-
  Renewable energies such as solar and wind power, hydropower, geothermal energy
  and biomass offer sustainable alternatives to fossil fuels. 

  By increasing the use of renewable energy sources, we can reduce our
  dependence on fossil fuels, cut greenhouse gas emissions and improve air
  quality. 

  The transition to renewable energies is a key element of local climate policy.
