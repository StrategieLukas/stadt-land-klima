name: Allgemein
icon: space_dashboard
note: null
color: null
panels:
  - name: "# Lokalteam-Nutzer"
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 1
    position_y: 3
    width: 14
    height: 5
    options:
      collection: directus_users
      function: countDistinct
      field: email
      filter:
        _and:
          - _or:
              - role:
                  name:
                    _contains: Localteam
              - role:
                  name:
                    _contains: Lokalteam
  - name: "# Redaktions-Nutzer"
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 16
    position_y: 3
    width: 14
    height: 5
    options:
      collection: directus_users
      filter:
        _and:
          - role:
              name:
                _contains: EditorArticles
      function: countDistinct
      field: email
  - name: "# Admins"
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 31
    position_y: 3
    width: 11
    height: 5
    options:
      collection: directus_users
      size: half
      field: email
      function: countDistinct
      filter:
        _and:
          - role:
              name:
                _contains: Administrator
  - name: Bewertete Maßnahmen (v1.0)
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 1
    position_y: 12
    width: 18
    height: 5
    options:
      collection: ratings_measures
      function: count
      field: id
      filter:
        _and:
          - measure_published:
              _eq: true
          - status:
              _eq: published
          - measure_id:
              catalog_version:
                name:
                  _contains: v1.0
  - name: Registrierte Lokalteams
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 30
    position_y: 12
    width: 19
    height: 5
    options:
      collection: localteams
      field: id
      function: countDistinct
      filter:
        _and:
          - admin_id:
              email:
                _nnull: true
  - name: Gegründete Lokalteams seit Release
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 51
    position_y: 12
    width: 19
    height: 5
    options:
      collection: localteams
      field: id
      function: countDistinct
      filter:
        _and:
          - admin_id:
              email:
                _nnull: true
          - date_created:
              _gte: 2025-10-28T12:00:00+01:00
  - name: Davon als "nicht anwendbar" markiert
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 3
    position_y: 18
    width: 20
    height: 5
    options:
      collection: ratings_measures
      field: id
      function: count
      filter:
        _and:
          - applicable:
              _eq: false
          - measure_id:
              catalog_version:
                name:
                  _contains: v1.0
  - name: Davon fertig (v1.0)
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 30
    position_y: 18
    width: 19
    height: 5
    options:
      collection: municipalities
      field: id
      function: countDistinct
      filter:
        _and:
          - status:
              _eq: published
          - _and:
              - scores:
                  catalog_version:
                    name:
                      _contains: v1.0
              - scores:
                  percentage_rated:
                    _gt: "99.9"
      sortField: null
  - name: Davon fertig (beta)
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 51
    position_y: 18
    width: 19
    height: 5
    options:
      collection: municipalities
      field: id
      function: countDistinct
      filter:
        _and:
          - status:
              _eq: published
          - _and:
              - scores:
                  catalog_version:
                    name:
                      _contains: beta
              - scores:
                  percentage_rated:
                    _gt: "95"
      sortField: null
  - name: Bewertete Maßnahmen (beta)
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 1
    position_y: 24
    width: 18
    height: 5
    options:
      collection: ratings_measures
      filter:
        _and:
          - measure_published:
              _eq: true
          - status:
              _eq: published
          - measure_id:
              catalog_version:
                name:
                  _contains: beta
      field: id
      function: count
  - name: Davon in Arbeit (v1.0)
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 30
    position_y: 24
    width: 19
    height: 5
    options:
      collection: municipalities
      field: id
      function: countDistinct
      filter:
        _and:
          - status:
              _neq: published
          - _and:
              - scores:
                  percentage_rated:
                    _gt: "0"
              - scores:
                  catalog_version:
                    name:
                      _contains: v1.0
      sortField: null
  - name: Davon in Arbeit (beta)
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 51
    position_y: 24
    width: 19
    height: 5
    options:
      collection: municipalities
      field: id
      function: countDistinct
      filter:
        _and:
          - status:
              _neq: published
          - _and:
              - scores:
                  percentage_rated:
                    _gt: "0"
              - scores:
                  catalog_version:
                    name:
                      _contains: beta
      sortField: null
  - name: Davon noch nicht angefangen (v1.0)
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 30
    position_y: 30
    width: 19
    height: 5
    options:
      collection: municipalities
      field: id
      function: countDistinct
      filter:
        _and:
          - status:
              _neq: published
          - _and:
              - scores:
                  catalog_version:
                    name:
                      _contains: v1.0
              - scores:
                  percentage_rated:
                    _eq: "0"
      sortField: null
  - name: Davon noch nicht angefangen (beta)
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 51
    position_y: 30
    width: 19
    height: 5
    options:
      collection: municipalities
      field: id
      function: countDistinct
      filter:
        _and:
          - status:
              _neq: published
          - _and:
              - scores:
                  catalog_version:
                    name:
                      _contains: v1.0
              - scores:
                  percentage_rated:
                    _eq: "0"
          - date_created:
              _lt: 2025-10-28T12:00:00+01:00
      sortField: null
  - name: Davon gegründet vor ->
    icon: null
    color: null
    show_header: true
    note: null
    type: metric
    position_x: 30
    position_y: 38
    width: 19
    height: 6
    options:
      collection: municipalities
      field: id
      function: countDistinct
      filter:
        _and:
          - status:
              _neq: published
          - date_created:
              _lt: "{{ inactivity_cutoff }}"
          - _and:
              - scores:
                  catalog_version:
                    name:
                      _contains: v1.0
              - scores:
                  percentage_rated:
                    _eq: "0"
      sortField: null
  - name: Inaktiv seit...
    icon: null
    color: null
    show_header: false
    note: null
    type: variable
    position_x: 51
    position_y: 38
    width: 15
    height: 6
    options:
      type: date
      inter: datetime
      defaultValue: 2025-01-01
      field: inactivity_cutoff
