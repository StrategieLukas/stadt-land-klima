name: Public
icon: globe
description: Öffentlicher Zugriff
enforce_tfa: false
admin_access: false
app_access: false
permissions:
  - collection: directus_files
    action: read
    permissions:
      _and:
        - folder:
            name:
              _eq: public
    validation: null
    presets: null
    fields:
      - id
      - title
      - description
      - type
      - metadata
      - filename_download
      - width
      - height
      - charset
      - duration
      - filesize
  - collection: directus_folders
    action: read
    permissions:
      _and:
        - name:
            _eq: public
    validation: null
    presets: null
    fields:
      - "*"
