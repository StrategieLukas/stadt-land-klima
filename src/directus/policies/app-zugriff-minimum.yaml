    action: read
    permissions:
      _and:
        - user_id:
            _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - "*"
  - collection: user_agreements
    action: update
    permissions:
      _and:
        - user_id:
            _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - newsletter_subscribed
      - newsletter_subscribed_at
  - collection: user_consent
    action: create
    permissions: null
    validation:
      _and:
        - user_id:
            _eq: $CURRENT_USER
    presets: null
    fields:
      - id
      - consent_target
      - user_id
  - collection: user_consent
    action: read
    permissions:
      _and:
        - user_id:
            _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - id
      - consent_target
      - user_id
      - date_updated
      - date_created
