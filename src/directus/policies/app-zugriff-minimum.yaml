        _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - status
  - collection: directus_presets
    action: create
    permissions: {}
    validation:
      user:
        _eq: $CURRENT_USER
    presets: null
    fields:
      - "*"
  - collection: directus_presets
    action: delete
    permissions:
      user:
        _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_presets
    action: read
    permissions:
      _or:
        - user:
            _eq: $CURRENT_USER
        - _and:
            - user:
                _null: true
            - role:
                _eq: $CURRENT_ROLE
        - _and:
            - user:
                _null: true
            - role:
                _null: true
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_presets
    action: update
    permissions:
      user:
        _eq: $CURRENT_USER
    validation:
      user:
        _eq: $CURRENT_USER
    presets: null
    fields:
      - "*"
  - collection: directus_relations
    action: read
    permissions: {}
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_roles
    action: read
    permissions:
      id:
        _in: $CURRENT_ROLES
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_settings
    action: read
    permissions: {}
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_shares
    action: read
    permissions:
      user_created:
        _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_translations
    action: read
    permissions: {}
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_translations
    action: read
    permissions: {}
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_users
    action: read
    permissions:
      id:
        _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - id
      - first_name
      - last_name
      - email
      - password
      - tfa_secret
      - status
      - role
  - collection: directus_users
    action: update
    permissions:
      _and:
        - id:
            _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - password
      - tfa_secret
  - collection: user_agreements
    action: create
    permissions: null
    validation: null
    presets: null
    fields:
      - user_id
      - agb_version
      - agb_accepted_at
      - data_protection_version
      - data_protection_accepted_at
      - newsletter_subscribed
      - newsletter_subscribed_at
