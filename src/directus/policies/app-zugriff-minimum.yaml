name: App-Zugriff-Minimum
icon: accessibility
description: Minimaler Zugriff aller App-User
enforce_tfa: false
admin_access: false
app_access: true
permissions:
  - collection: agreement_versions
    action: read
    permissions: null
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_activity
    action: read
    permissions:
      user:
        _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_collections
    action: read
    permissions: {}
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_comments
    action: create
    permissions: {}
    validation:
      comment:
        _nnull: true
    presets: null
    fields:
      - "*"
  - collection: directus_comments
    action: delete
    permissions:
      user_created:
        _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_comments
    action: read
    permissions:
      user_created:
        _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_comments
    action: update
    permissions:
      user_created:
        _eq: $CURRENT_USER
    validation: null
    presets: null
    fields:
      - comment
  - collection: directus_fields
    action: read
    permissions: {}
    validation: null
    presets: null
    fields:
      - "*"
  - collection: directus_notifications
    action: read
    permissions:
