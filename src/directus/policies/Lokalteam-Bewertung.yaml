name: Lokalteam-Bewertung
icon: badge
description: Ermöglicht die Bewertung der eigenen Kommune
enforce_tfa: false
admin_access: false
app_access: false
permissions:
  - collection: measure_catalog
    action: read
    permissions:
      _and:
        - hidden:
            _neq: true
    validation: null
    presets: null
    fields:
      - id
      - name
  - collection: measures
    action: read
    permissions:
      _and:
        - status:
            _eq: published
        - catalog_version:
            isCurrentBackend:
              _eq: true
        - catalog_version:
            hidden:
              _eq: false
    validation: {}
    presets: null
    fields:
      - name
      - sector
      - impact
      - weight
      - feasibility
      - feasibility_political
      - feasibility_economical
      - description
      - verification_description
      - notes
      - id
      - status
      - accordion-p4jgb8
      - description_evaluation_criteria
      - description_about
      - description_benefit
      - description_verification
      - description_contribution
      - description_implementation
      - description_legal
      - description_funding
      - description_tutorial
      - slug
      - measure_id
  - collection: municipalities
    action: read
    permissions:
      _and:
        - localteam_id:
            id:
              _in:
                - $CURRENT_USER.localteams.localteam_id
    validation: null
    presets: null
    fields:
      - overall_status_comment
      - links-g1sxxi
  - collection: municipalities
    action: update
    permissions:
      _and:
        - localteam_id:
            id:
              _in:
                - $CURRENT_USER.localteams.localteam_id
    validation: null
    presets: null
    fields:
      - overall_status_comment
      - status
  - collection: municipality_scores
    action: read
    permissions:
      _and:
        - municipality:
            localteam_id:
              _in:
                - $CURRENT_USER.localteams.localteam_id
        - catalog_version:
            hidden:
              _neq: true
    validation: null
    presets: null
    fields:
      - id
      - date_updated
      - date_created
      - catalog_version
      - published
      - score_total
      - score_points
      - score_max
      - score_buildings
      - municipality
      - percentage_rated
      - score_energy
      - score_industry
      - score_agriculture
      - score_management
      - score_transport
      - rank
  - collection: municipality_scores
    action: update
    permissions:
      _and:
        - municipality:
            localteam_id:
              _in:
                - $CURRENT_USER.localteams.localteam_id
        - catalog_version:
            hidden:
              _neq: true
    validation: null
    presets: null
    fields:
      - published
  - collection: ratings_measures
    action: read
    permissions:
      _and:
        - localteam_id:
            _in:
              - $CURRENT_USER.localteams.localteam_id
        - measure_published:
            _eq: true
        - measure_id:
            catalog_version:
              isCurrentBackend:
                _eq: true
        - measure_id:
            catalog_version:
              hidden:
                _eq: false
    validation: null
    presets: null
    fields:
      - measure_id
      - rating
      - approved
      - Source
      - status
      - user_updated
      - date_updated
      - id
      - links-jv6and
      - choices
      - current_progress
      - source
      - internal_note
      - applicable
      - why_not_applicable
      - measure_info_preview
  - collection: ratings_measures
    action: update
    permissions:
      _and:
        - localteam_id:
            _in:
              - $CURRENT_USER.localteams.localteam_id
        - measure_published:
            _eq: true
    validation: null
    presets: null
    fields:
      - status
      - rating
      - current_progress
      - source
      - internal_note
      - applicable
      - why_not_applicable
